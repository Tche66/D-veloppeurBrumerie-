<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2d3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Cercles déco -->
  <circle cx="500" cy="100" r="120" fill="#2563eb" opacity="0.1"/>
  <circle cx="100" cy="500" r="100" fill="#0d9488" opacity="0.1"/>

  <!-- Avatar cercle -->
  <circle cx="300" cy="220" r="100" fill="url(#accent)" opacity="0.3"/>
  <circle cx="300" cy="200" r="80" fill="url(#accent)" opacity="0.5"/>

  <!-- Silhouette personne -->
  <circle cx="300" cy="185" r="42" fill="#2563eb" opacity="0.9"/>
  <ellipse cx="300" cy="310" rx="65" ry="50" fill="#2563eb" opacity="0.7"/>

  <!-- Texte -->
  <text x="300" y="420" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">Doukoua Tché Serge Alain</text>
  <text x="300" y="450" font-family="Arial, sans-serif" font-size="14"
        fill="#0d9488" text-anchor="middle">PDG &amp; Lead Developer — Brumerie</text>

  <!-- Instruction -->
  <rect x="150" y="490" width="300" height="60" rx="12" fill="white" opacity="0.05" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="300" y="516" font-family="Arial, sans-serif" font-size="12"
        fill="white" text-anchor="middle" opacity="0.5">📸 Remplacez ce fichier par</text>
  <text x="300" y="536" font-family="Arial, sans-serif" font-size="12"
        fill="#0d9488" text-anchor="middle">public/images/pdg-photo.webp</text>
</svg>
